<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

  <body>
    <h1>Inline JS</h1>

    <!-- inline JS only for events -->

    <button onclick="greetMe()">Click Me</button>

    <!-- internal JS -->

    <script>
      console.log("connected");

      function greetMe() {
        alert("hello!..How Are You");
      }
    </script>
  </body>
